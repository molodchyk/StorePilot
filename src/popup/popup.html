<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="extensionName">StorePilot</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header class="popup-header">
        <h1 data-i18n="extensionName">StorePilot</h1>
        <button id="openOptionsShortcut" class="header-shortcut" type="button" title="Open StorePilot options" aria-label="Open StorePilot options" data-i18n-title="openStorePilotOptions" data-i18n-aria-label="openStorePilotOptions">SP</button>
      </header>
      <p id="summary" data-i18n="loadingListings">Loading listings...</p>
      <p id="status" aria-live="polite"></p>
      <details id="diagnostics" class="diagnostics" hidden>
        <summary data-i18n="diagnostics">Diagnostics</summary>
        <pre id="diagnosticsText"></pre>
      </details>
      <label class="project-picker">
        <span data-i18n="project">Project</span>
        <select id="projectSelect"></select>
      </label>
      <div class="actions">
        <div class="action-group action-group-single">
          <button id="importFolder" type="button" data-i18n="importProjectFolder">Import project/folder</button>
        </div>
        <div class="action-group" data-popup-section="listing">
          <button id="fillCurrentLanguage" type="button" hidden data-i18n="fillCurrentLanguage">Fill current language</button>
          <button id="fillAllLanguages" type="button" data-i18n="fillAllLanguages">Fill descriptions</button>
          <button id="selectCategory" type="button" data-i18n="selectCategory">Select category</button>
        </div>
        <div class="action-group" data-popup-section="listing">
          <button id="uploadStoreIcon" type="button" data-i18n="uploadStoreIcon">Upload store icon</button>
          <button id="uploadScreenshots" type="button" data-i18n="uploadScreenshots">Upload screenshots</button>
          <button id="uploadSmallPromo" type="button" data-i18n="uploadSmallPromo">Upload small promo</button>
          <button id="uploadMarqueePromo" type="button" data-i18n="uploadMarqueePromo">Upload marquee promo</button>
        </div>
        <div class="action-group" data-popup-section="listing">
          <button id="clearStoreIcon" class="danger-action" type="button" data-i18n="clearStoreIcon">Clear store icon</button>
          <button id="clearScreenshots" class="danger-action" type="button" data-i18n="clearScreenshots">Clear screenshots</button>
          <button id="clearSmallPromo" class="danger-action" type="button" data-i18n="clearSmallPromo">Clear small promo</button>
          <button id="clearMarqueePromo" class="danger-action" type="button" data-i18n="clearMarqueePromo">Clear marquee promo</button>
        </div>
        <div class="action-group action-group-single" data-popup-section="listing">
          <button id="fillAdditionalFields" type="button" data-i18n="fillAdditionalFields">Fill additional fields</button>
        </div>
        <div class="action-group" data-popup-section="privacy">
          <button id="fillSinglePurpose" type="button" data-i18n="fillSinglePurpose">Fill single purpose</button>
          <button id="fillPrivacy" type="button" data-i18n="fillPrivacy">Fill privacy</button>
          <button id="fillDataUsage" type="button" data-i18n="fillDataUsage">Fill data usage</button>
          <button id="diagnosePrivacyPage" type="button" data-i18n="diagnosePage">Diagnose page</button>
        </div>
        <div id="utilityActions" class="action-group">
          <button id="abortFillAll" class="danger-action" type="button" hidden data-i18n="abortOperation">Abort operation</button>
          <button id="openPanel" type="button" hidden data-i18n="openPanel">Open panel</button>
        </div>
      </div>
      <div class="theme-control" aria-label="Theme" data-i18n-aria-label="theme">
        <button type="button" data-theme-choice="system" data-i18n="themeSystem">System</button>
        <button type="button" data-theme-choice="light" data-i18n="themeLight">Light</button>
        <button type="button" data-theme-choice="dark" data-i18n="themeDark">Dark</button>
      </div>
    </main>
    <script src="../platform/webextension.js"></script>
    <script src="../shared/constants.js"></script>
    <script src="../shared/i18n.js"></script>
    <script src="../shared/files.js"></script>
    <script src="../shared/projects.js"></script>
    <script src="../shared/handles.js"></script>
    <script src="../shared/dashboard-url.js"></script>
    <script src="../shared/directory-detection.js"></script>
    <script src="../shared/media-assets.js"></script>
    <script src="../shared/privacy-doc.js"></script>
    <script src="../shared/category-doc.js"></script>
    <script src="../shared/additional-fields-doc.js"></script>
    <script src="../shared/storage.js"></script>
    <script src="../shared/importers.js"></script>
    <script src="../project-overrides.js"></script>
    <script src="../import-ui.js"></script>
    <script src="dashboard-page.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
