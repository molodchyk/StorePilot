<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StorePilot</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>StorePilot</h1>
      <p id="summary">Loading listings...</p>
      <label class="project-picker">
        <span>Project</span>
        <select id="projectSelect"></select>
      </label>
      <div class="actions">
        <button id="importFolder" type="button">Import project/folder</button>
        <label class="file-button">
          <span>Import files</span>
          <input id="listingFiles" type="file" accept=".txt,.md,.markdown,.text,.rtf,.html,.htm,.json,.yaml,.yml,.csv,.tsv,.xml,.properties" multiple>
        </label>
        <input id="listingFolderFallback" class="hidden-input" type="file" accept=".txt,.md,.markdown,.text,.rtf,.html,.htm,.json,.yaml,.yml,.csv,.tsv,.xml,.properties" webkitdirectory multiple>
        <button id="syncProject" type="button">Sync project</button>
        <button id="fillField" type="button">Fill field</button>
        <button id="fillCurrentLanguage" type="button">Fill current language</button>
        <button id="fillAllLanguages" type="button">Fill all languages</button>
        <button id="copyText" type="button">Copy text</button>
        <button id="openOptions" type="button">Options</button>
      </div>
      <div class="theme-control" aria-label="Theme">
        <button type="button" data-theme-choice="system">System</button>
        <button type="button" data-theme-choice="light">Light</button>
        <button type="button" data-theme-choice="dark">Dark</button>
      </div>
      <p id="status"></p>
    </main>
    <script src="../shared/listing-import.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
